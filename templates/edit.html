<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Record</title>
    <style>
        body { text-align: center; padding: 20px; transition: 0.3s; }
        .container { max-width: 450px; margin: 0 auto; padding: 25px; border-radius: 20px; }
        .section-title { font-size: 0.85em; font-weight: bold; margin-top: 20px; display: block; text-align: left; margin-left: 5%; letter-spacing: 1px; }
        input, textarea, select { width: 90%; margin: 8px 0; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
        .student-area { padding: 10px; border-radius: 12px; margin-top: 10px; }
        button { width: 90%; padding: 15px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1.1em; margin-top: 25px; border: none; }

        body.ann { background-color: #ffffff; color: #2d2d2d; font-family: 'Hiragino Sans', sans-serif; }
        body.ann .container { border: 3px solid #2d2d2d; background: #fdf5e6; }
        body.ann .section-title { color: #e53935; }
        body.ann .student-area { background: rgba(255, 255, 255, 0.5); border: 2px dashed #795548; }
        body.ann button { background: #e53935; color: white; }

        body.taisei { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        body.taisei .container { border: 1px solid #fb923c; background: #1e293b; }
        body.taisei .section-title { color: #fb923c; }
        body.taisei .student-area { background: rgba(255, 255, 255, 0.1); border: 2px dashed #475569; }
        body.taisei button { background: #fb923c; color: white; }
    </style>
</head>

<body class="{{ 'ann' if mode == 's01' else 'taisei' }}">

<div class="container">
    <h2>
        {% if mode == 's01' %}Lesson Record 🐾{% else %}SESSION LOG 🎹{% endif %}
    </h2>
    <p style="font-family: monospace; font-size: 0.9em;">Date: {{ date }}</p>

    <form action="{{ url_for('save', mode=mode) }}" method="post">
        <input type="hidden" name="date" value="{{ date }}">

        <span class="section-title">1. STAMP & STICKER</span>
        <select name="stamp">
            {% if mode == 's01' %}
                <option value="🍪" {% if record and record.stamp == '🍪' %}selected{% endif %}>🍪 クッキー (Cookie)</option>
                <option value="🐾" {% if record and record.stamp == '🐾' %}selected{% endif %}>🐾 足跡 (Paws)</option>
                <option value="🌸" {% if record and record.stamp == '🌸' %}selected{% endif %}>🌸 サクラ (Sakura)</option>
                <option value="🎂" {% if record and record.stamp == '🎂' %}selected{% endif %}>🎂 ケーキ (Special!)</option>
            {% else %}
                <option value="🔥" {% if record and record.stamp == '🔥' %}selected{% endif %}>🔥 Very Good!</option>
                <option value="🎹" {% if record and record.stamp == '🎹' %}selected{% endif %}>🎹 Good</option>
                <option value="🎧" {% if record and record.stamp == '🎧' %}selected{% endif %}>🎧 Absent</option>  {# 意味を明記 #}
            {% endif %}
        </select>

        <div class="student-area">
            <span class="section-title" style="margin-top:0;">2. YOUR MESSAGE ({{ 'ann' if mode == 's01' else 'taisei' }})</span>
            <textarea name="student_comment" rows="3" placeholder="今日の感想を書いてね！(How was today's lesson?)">{{ record.student_comment if record else '' }}</textarea>
        </div>

        <span class="section-title">3. MESSAGE FROM TEACHER</span>
        <textarea name="public_comment" rows="2" placeholder="先生からのメッセージ">{{ record.public_comment if record else '' }}</textarea>  {# 修正: comment→public_comment、readonlyを削除 #}

        <span class="section-title">4. LOG DETAILS</span>
        <input type="text" name="lesson_point" placeholder="今日のポイント" value="{{ record.lesson_point if record else '' }}">  {# 修正: point→lesson_point #}
        <input type="text" name="homework" placeholder="宿題 (Next Challenge)" value="{{ record.homework if record else '' }}">
        <textarea name="ai_memo" rows="2" placeholder="AIメモ（RAG用）">{{ record.ai_memo if record else '' }}</textarea>

        <button type="submit">
            {% if mode == 's01' %}きろくを保存！{% else %}SAVE SESSION{% endif %}
        </button> 
    </form>
    
    <a href="{{ url_for('index', mode=mode) }}" style="text-decoration: none; color: inherit; font-size: 0.8em; opacity: 0.6; display: block; margin-top: 20px;">キャンセル / Back</a>
</div>

</body>
</html>
